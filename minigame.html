<section id="minigame">
  <h2>Mini Game: Explorador de Constelações</h2>
  <canvas id="gameCanvas" width="600" height="400" style="background:#0d0d0d; border:2px solid #00cc88;"></canvas>
  <p id="gameMessage" style="color:#00cc88; font-weight:bold; margin-top:10px;"></p>
</section>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  const planets = [
    {x:100, y:150, r:30, color:"#00cc88", name:"Crie Currículo Grátis", link:"https://jkkbr.github.io/crie-curriculo-gratis/"},
    {x:300, y:80, r:30, color:"#ff8800", name:"Gerador de Diagrama", link:"https://jkkbr.github.io/gerador-de-diagrama/"},
    {x:500, y:200, r:30, color:"#0088ff", name:"Portfólio Online", link:"https://jkkbr.github.io/portfolio/"}
  ];

  let visited = [];

  function drawPlanets() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    planets.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.closePath();
    });
  }

  canvas.addEventListener("click", e => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    planets.forEach(p => {
      const dist = Math.sqrt((mouseX - p.x)**2 + (mouseY - p.y)**2);
      if(dist < p.r) {
        visited.push(p.name);
        document.getElementById("gameMessage").innerHTML = 
          `🌌 Você descobriu <b>${p.name}</b>! <a href="${p.link}" target="_blank" style="color:#fff;">Acessar</a>`;
        if(visited.length === planets.length) {
          document.getElementById("gameMessage").innerHTML = "🚀 Você explorou todo o universo JKKBR!";
        }
      }
    });
  });

  drawPlanets();
</script>
